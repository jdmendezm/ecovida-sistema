<!DOCTYPE html>
<html>
<head>
    <title>EcoVida | Editar Servicio</title>

    <style>

        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #1e293b;
            border-radius: 10px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
        }

        textarea {
            height: 120px;
        }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            width: 100%;
        }

        .btn-secondary {
            background: #22c55e;
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Editar Servicio</h2>

    <!-- BOTÓN VOLVER -->

    <a href="{{ url_for('servicios.listar_servicios') }}"
       class="btn btn-secondary">

        Volver a servicios

    </a>

    <form method="POST">

        <input
            type="text"
            name="nombre"
            value="{{ servicio.nombre }}"
            required
        >

        <textarea
            name="descripcion"
            required
        >{{ servicio.descripcion }}</textarea>

        <select name="estado" required>

            <option value="Pendiente"
            {% if servicio.estado == "Pendiente" %}
            selected
            {% endif %}
            >
            Pendiente
            </option>

            <option value="En proceso"
            {% if servicio.estado == "En proceso" %}
            selected
            {% endif %}
            >
            En proceso
            </option>

            <option value="En mantenimiento"
            {% if servicio.estado == "En mantenimiento" %}
            selected
            {% endif %}
            >
            En mantenimiento
            </option>

            <option value="Finalizado"
            {% if servicio.estado == "Finalizado" %}
            selected
            {% endif %}
            >
            Finalizado
            </option>

        </select>

        <select name="prioridad" required>

            <option value="Baja"
            {% if servicio.prioridad == "Baja" %}
            selected
            {% endif %}
            >
            Baja
            </option>

            <option value="Media"
            {% if servicio.prioridad == "Media" %}
            selected
            {% endif %}
            >
            Media
            </option>

            <option value="Alta"
            {% if servicio.prioridad == "Alta" %}
            selected
            {% endif %}
            >
            Alta
            </option>

            <option value="Crítica"
            {% if servicio.prioridad == "Crítica" %}
            selected
            {% endif %}
            >
            Crítica
            </option>

        </select>

        <button class="btn btn-primary">
            Actualizar Servicio
        </button>

    </form>

</div>

</body>

</html>
