<!DOCTYPE html>
<html>

<head>

    <title>EcoVida | Configuración</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="layout">

    <div class="sidebar">

        <h2>EcoVida</h2>

        <div class="menu">

            <a href="{{ url_for('index') }}">
                <div class="menu-item">
                    Dashboard
                </div>
            </a>

            <a href="{{ url_for('reportes.ver_reportes') }}">
                <div class="menu-item">
                    Reportes
                </div>
            </a>

            <a href="{{ url_for('sensores.listar_sensores') }}">
                <div class="menu-item">
                    Sensores
                </div>
            </a>

            <a href="{{ url_for('alertas.listar_alertas') }}">
                <div class="menu-item">
                    Alertas
                </div>
            </a>

            <a href="{{ url_for('configuraciones.configuracion') }}">
                <div class="menu-item active">
                    Configuración
                </div>
            </a>

            <a href="{{ url_for('servicios.listar_servicios') }}">
                <div class="menu-item">
                    Servicios TI
                </div>
            </a>

            <a href="{{ url_for('logout') }}">
                <div class="menu-item logout">
                    Cerrar Sesión
                </div>
            </a>

        </div>

    </div>

    <div class="main">

        <h1>Configuración del Sistema</h1>

        <br>

        <table>

            <tr>

                <th>ID</th>
                <th>Parámetro</th>
                <th>Valor</th>
                <th>Acciones</th>

            </tr>

            {% for c in configuraciones %}

            <tr>

                <td>{{ c.id }}</td>
                <td>{{ c.parametro }}</td>
                <td>{{ c.valor }}</td>

                <td>

                    <a href="{{ url_for('configuraciones.editar_configuracion', id=c.id) }}">
                        Editar
                    </a>

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>

</html>
